<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders | Admin Portal</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header id="main-header"></header>

  <div class="admin-container">
    <!-- Sidebar navigation placeholder -->
    <aside class="admin-sidebar" id="admin-sidebar"></aside>

    <main class="admin-content">
      <div class="panel-header" style="margin-bottom: 2rem;">
        <div>
          <h2 style="font-size: 1.8rem; font-weight: 700;">Live Kitchen Orders Board</h2>
          <p style="color: var(--text-muted); font-size: 0.95rem;">Track and progress cafeteria orders through preparation stages.</p>
        </div>
        <div>
          <button class="btn btn-secondary btn-sm" onclick="loadAdminOrdersBoard()"><i class="fas fa-sync"></i> Refresh Board</button>
        </div>
      </div>

      <!-- Live Kanban Board Columns -->
      <div class="admin-orders-board">
        <!-- 1. Pending Column -->
        <div class="board-column">
          <div class="board-column-header">
            <span class="board-column-title" style="color: var(--primary);">Pending</span>
            <span class="board-column-count" id="count-pending">0</span>
          </div>
          <div id="column-pending-list">
            <!-- Cards inside pending -->
          </div>
        </div>

        <!-- 2. Preparing Column -->
        <div class="board-column">
          <div class="board-column-header">
            <span class="board-column-title" style="color: var(--info);">Preparing</span>
            <span class="board-column-count" id="count-preparing">0</span>
          </div>
          <div id="column-preparing-list">
            <!-- Cards inside preparing -->
          </div>
        </div>

        <!-- 3. Ready Column -->
        <div class="board-column">
          <div class="board-column-header">
            <span class="board-column-title" style="color: var(--warning);">Ready</span>
            <span class="board-column-count" id="count-ready">0</span>
          </div>
          <div id="column-ready-list">
            <!-- Cards inside ready -->
          </div>
        </div>

        <!-- 4. Completed Column -->
        <div class="board-column">
          <div class="board-column-header">
            <span class="board-column-title" style="color: var(--success);">Completed</span>
            <span class="board-column-count" id="count-completed">0</span>
          </div>
          <div id="column-completed-list">
            <!-- Cards inside completed -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/admin/admin.js"></script>

  <script>
    async function onAdminPageLoad() {
      loadAdminOrdersBoard();
      // Polling refresh loop every 15 seconds for live dashboard updates
      setInterval(loadAdminOrdersBoard, 15000);
    }

    async function loadAdminOrdersBoard() {
      try {
        const orders = await API.getAdminOrders();
        
        // Group orders by status
        const pending = orders.filter(o => o.status === 'Pending');
        const preparing = orders.filter(o => o.status === 'Preparing');
        const ready = orders.filter(o => o.status === 'Ready');
        const completed = orders.filter(o => o.status === 'Completed');

        // Update counts
        document.getElementById('count-pending').textContent = pending.length;
        document.getElementById('count-preparing').textContent = preparing.length;
        document.getElementById('count-ready').textContent = ready.length;
        document.getElementById('count-completed').textContent = completed.length;

        // Render columns
        renderColumnCards('column-pending-list', pending, 'Preparing', 'Start Preparing', 'btn-primary');
        renderColumnCards('column-preparing-list', preparing, 'Ready', 'Mark Ready', 'btn-warning');
        renderColumnCards('column-ready-list', ready, 'Completed', 'Hand Over Food', 'btn-success');
        renderColumnCards('column-completed-list', completed, null, null, null);

      } catch (error) {
        console.error('Failed to populate admin board:', error);
      }
    }

    function renderColumnCards(containerId, list, targetStatus, actionText, actionBtnClass) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      if (list.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 2rem 1rem; border: 1px dashed var(--border-color); border-radius: 8px; color: var(--text-muted); font-size: 0.85rem;">
            No orders
          </div>
        `;
        return;
      }

      list.forEach(order => {
        const card = document.createElement('div');
        card.className = 'order-board-card';

        const timeStr = new Date(order.order_time).toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit'
        });

        // Items list rendering
        let foodItemsListHtml = '';
        order.items.forEach(i => {
          foodItemsListHtml += `<div>${i.name} <strong>x${i.quantity}</strong></div>`;
        });

        // Bottom Actions Button
        let btnHtml = '';
        if (targetStatus && actionText) {
          btnHtml = `
            <button class="btn ${actionBtnClass} btn-sm" style="width: 100%; margin-top: 0.75rem;" onclick="transitionOrder(${order.id}, '${targetStatus}')">
              ${actionText} <i class="fas fa-arrow-right"></i>
            </button>
          `;
        }

        card.innerHTML = `
          <div class="order-card-header">
            <span class="order-card-token">${order.token_number}</span>
            <span class="order-card-time"><i class="far fa-clock"></i> ${timeStr}</span>
          </div>
          <div class="order-card-customer">
            <i class="far fa-user"></i> ${order.customer_name}
          </div>
          <div class="order-card-items">
            ${foodItemsListHtml}
          </div>
          <div class="order-card-footer">
            <span style="font-size: 0.75rem; color: var(--text-muted);">Amount Paid</span>
            <span class="order-card-total">৳${parseFloat(order.total_amount).toFixed(2)}</span>
          </div>
          ${btnHtml}
        `;

        container.appendChild(card);
      });
    }

    async function transitionOrder(orderId, status) {
      try {
        await API.updateOrderStatus(orderId, status);
        loadAdminOrdersBoard(); // Refresh board immediately
      } catch (error) {
        alert('Failed to update order status: ' + error.message);
      }
    }
  </script>
</body>
</html>
