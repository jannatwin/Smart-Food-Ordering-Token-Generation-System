<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Categories | Admin Portal</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header id="main-header"></header>

  <div class="admin-container">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>

    <main class="admin-content">
      <div class="panel" style="max-width: 700px;">
        <div class="panel-header">
          <div>
            <h2 class="panel-title" style="font-size: 1.6rem;"><i class="fas fa-tags"></i> Food Categories</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem;">Organize your cafeteria menu categories efficiently.</p>
          </div>
          <button class="btn btn-primary btn-sm" onclick="openCatModal()"><i class="fas fa-plus"></i> Add Category</button>
        </div>

        <div class="table-responsive">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Category Name</th>
                <th style="width: 150px;">Actions</th>
              </tr>
            </thead>
            <tbody id="categories-table-body">
              <tr>
                <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                  <i class="fas fa-spinner fa-spin" style="margin-right: 0.5rem;"></i> Loading categories...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- ADD / EDIT CATEGORY MODAL -->
  <div class="modal" id="cat-modal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h3 id="modal-title" style="font-weight: 700;">Add Category</h3>
        <button class="modal-close" onclick="closeCatModal()">&times;</button>
      </div>
      <form id="cat-form" onsubmit="handleCatFormSubmit(event)">
        <input type="hidden" id="cat-id">
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="cat-name">Category Name</label>
          <input type="text" id="cat-name" class="form-control" required placeholder="e.g. Chinese Cuisine">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;"><i class="fas fa-save"></i> Save Category</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/admin/admin.js"></script>

  <script>
    async function onAdminPageLoad() {
      loadCategoriesList();
    }

    async function loadCategoriesList() {
      const tbody = document.getElementById('categories-table-body');
      try {
        const categories = await API.getAdminCategories();
        tbody.innerHTML = '';

        if (categories.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                No categories available. Click Add Category to create one!
              </td>
            </tr>
          `;
          return;
        }

        categories.forEach(cat => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>#${cat.id}</td>
            <td style="font-weight: 600;">${cat.category_name}</td>
            <td>
              <div class="actions-cell">
                <button class="btn btn-secondary btn-sm" onclick="openEditModal(${cat.id}, '${cat.category_name}')" title="Rename"><i class="fas fa-edit"></i></button>
                <button class="btn btn-danger btn-sm" onclick="deleteCategory(${cat.id})" title="Delete"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          `;
          tbody.appendChild(row);
        });

      } catch (error) {
        tbody.innerHTML = `
          <tr>
            <td colspan="3" style="text-align: center; color: var(--danger); padding: 2rem;">
              Failed to load categories.
            </td>
          </tr>
        `;
      }
    }

    function openCatModal() {
      const modal = document.getElementById('cat-modal');
      document.getElementById('modal-title').textContent = 'Add Category';
      document.getElementById('cat-id').value = '';
      document.getElementById('cat-form').reset();
      modal.classList.add('open');
    }

    function openEditModal(id, name) {
      const modal = document.getElementById('cat-modal');
      document.getElementById('modal-title').textContent = 'Rename Category';
      document.getElementById('cat-id').value = id;
      document.getElementById('cat-name').value = name;
      modal.classList.add('open');
    }

    function closeCatModal() {
      document.getElementById('cat-modal').classList.remove('open');
    }

    async function handleCatFormSubmit(event) {
      event.preventDefault();
      
      const id = document.getElementById('cat-id').value;
      const name = document.getElementById('cat-name').value.trim();

      try {
        if (id) {
          await API.editCategory(id, name);
        } else {
          await API.addCategory(name);
        }
        closeCatModal();
        loadCategoriesList();
      } catch (error) {
        alert('Failed to save category: ' + error.message);
      }
    }

    async function deleteCategory(id) {
      if (confirm('Are you sure you want to delete this category? Any food items currently in this category will become uncategorized.')) {
        try {
          await API.deleteCategory(id);
          loadCategoriesList();
        } catch (error) {
          alert('Failed to delete category: ' + error.message);
        }
      }
    }
  </script>
</body>
</html>
