<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | Smart Food Ordering System</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header id="main-header"></header>

  <main class="container">
    <div class="section-header">
      <h2>Shopping Cart</h2>
      <p>Verify your selected meals before checking out.</p>
    </div>

    <div id="cart-container">
      <!-- Injected Cart Layout -->
      <div style="text-align: center; padding: 4rem; color: var(--text-muted);">
        <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--primary);"></i>
        <p>Loading your cart...</p>
      </div>
    </div>
  </main>

  <footer id="main-footer"></footer>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCart();

      // Listen for local changes to update views
      window.addEventListener('cartUpdated', renderCart);
    });

    function renderCart() {
      const container = document.getElementById('cart-container');
      const items = Cart.get();

      if (items.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 5rem 2rem; background-color: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius);">
            <i class="fas fa-shopping-basket" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 1.5rem;"></i>
            <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Your Cart is Empty</h3>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Looks like you haven't added any delicious items to your cart yet.</p>
            <a href="/menu" class="btn btn-primary"><i class="fas fa-chevron-left"></i> View Food Menu</a>
          </div>
        `;
        return;
      }

      let rowsHtml = '';
      let mobileCardsHtml = '';
      items.forEach(item => {
        const itemSub = parseFloat(item.price) * item.quantity;
        const imgSrc = item.image || 'https://images.unsplash.com/photo-1498837167922-ddd27525d352?auto=format&fit=crop&w=100&q=80';

        rowsHtml += `
          <tr>
            <td>
              <div class="cart-item-detail">
                <img class="cart-item-img" src="${imgSrc}" alt="${item.name}">
                <div>
                  <div class="cart-item-name">${item.name}</div>
                  <div class="cart-item-category">${item.category_name}</div>
                </div>
              </div>
            </td>
            <td>৳${parseFloat(item.price).toFixed(2)}</td>
            <td>
              <div class="qty-control">
                <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})"><i class="fas fa-minus"></i></button>
                <span class="qty-val">${item.quantity}</span>
                <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})"><i class="fas fa-plus"></i></button>
              </div>
            </td>
            <td><strong>৳${itemSub.toFixed(2)}</strong></td>
            <td>
              <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove item"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
        `;

        mobileCardsHtml += `
          <div class="cart-mobile-card">
            <div class="cart-mobile-main">
              <img class="cart-item-img" src="${imgSrc}" alt="${item.name}">
              <div>
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-category">${item.category_name}</div>
                <div class="cart-mobile-price">৳${parseFloat(item.price).toFixed(2)} each</div>
              </div>
            </div>
            <div class="cart-mobile-actions">
              <div class="qty-control">
                <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})"><i class="fas fa-minus"></i></button>
                <span class="qty-val">${item.quantity}</span>
                <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})"><i class="fas fa-plus"></i></button>
              </div>
              <strong>৳${itemSub.toFixed(2)}</strong>
              <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove item"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        `;
      });

      const subtotal = Cart.total();
      const vat = subtotal * 0.05; // 5% VAT
      const grandTotal = subtotal + vat;

      container.innerHTML = `
        <div class="cart-wrapper">
          <!-- Cart Table -->
          <div style="background-color: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 2rem; box-shadow: var(--card-shadow);">
            <div class="table-responsive">
              <table class="cart-table">
                <thead>
                  <tr>
                    <th>Food Item</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${rowsHtml}
                </tbody>
              </table>
            </div>

            <div class="cart-mobile-list">
              ${mobileCardsHtml}
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-top: 1.5rem;">
              <a href="/menu" class="btn btn-secondary btn-sm"><i class="fas fa-plus"></i> Add More Items</a>
              <button class="btn btn-danger btn-sm" onclick="clearCart()"><i class="fas fa-trash-alt"></i> Clear Cart</button>
            </div>
          </div>

          <!-- Checkout Box -->
          <div class="summary-card">
            <h3>Order Summary</h3>
            <div class="summary-row">
              <span>Items Subtotal</span>
              <span>৳${subtotal.toFixed(2)}</span>
            </div>
            <div class="summary-row">
              <span>Govt VAT (5%)</span>
              <span>৳${vat.toFixed(2)}</span>
            </div>
            <div class="summary-row total">
              <span>Grand Total</span>
              <span>৳${grandTotal.toFixed(2)}</span>
            </div>
            <button class="btn btn-primary" id="checkout-btn" style="width: 100%; margin-top: 1.5rem;" onclick="proceedToCheckout()">
              Proceed to Checkout <i class="fas fa-arrow-right"></i>
            </button>
          </div>
        </div>
      `;
    }

    function updateQty(id, newQty) {
      Cart.update(id, newQty);
    }

    function removeItem(id) {
      Cart.remove(id);
    }

    function clearCart() {
      if (confirm('Are you sure you want to clear your shopping cart?')) {
        Cart.clear();
      }
    }

    async function proceedToCheckout() {
      // Check auth status
      const user = await API.getCurrentUser();
      if (!user) {
        // Redirect to login, specifying redirect path back to checkout
        window.location.href = '/login?redirect=' + encodeURIComponent('/checkout');
      } else {
        window.location.href = '/checkout';
      }
    }
  </script>
</body>
</html>
